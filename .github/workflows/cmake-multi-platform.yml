# CMake project on multiple platforms.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      BUILD_DIR: ${{ github.workspace }}/build-${{ github.run_id }}-${{ matrix.os }}-${{ matrix.c_compiler }}-${{ matrix.build_type }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            build_type: Debug
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            build_type: Debug
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            build_type: Debug
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            build_type: Debug

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4

    - name: Configure CMake
      run: |
        cmake -B "$BUILD_DIR" \
          -DCMAKE_CXX_COMPILER="${{ matrix.cpp_compiler }}" \
          -DCMAKE_C_COMPILER="${{ matrix.c_compiler }}" \
          -DCMAKE_BUILD_TYPE="${{ matrix.build_type }}" \
          -S "${{ github.workspace }}"

    - name: Build
      run: cmake --build "$BUILD_DIR" --config "${{ matrix.build_type }}"

    - name: Test
      run: cd "$BUILD_DIR" && ctest --build-config "${{ matrix.build_type }}"

    - name: Install to staging
      run: |
        STAGING="${RUNNER_TEMP}/simba-install"
        cmake --install "$BUILD_DIR" --config "${{ matrix.build_type }}" --prefix "$STAGING"

    - name: Upload install tree
      uses: actions/upload-artifact@v4
      with:
        name: simba-${{ matrix.os }}-${{ matrix.c_compiler }}-${{ matrix.build_type }}-${{ github.run_id }}
        path: ${{ runner.temp }}/simba-install
        if-no-files-found: error
